<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motosiklet İletişim</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: #f0f2f5; 
        }
        .card { 
            background: white; padding: 2rem; border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; 
            max-width: 320px; width: 90%; 
        }
        h1 { color: #1a1a1a; font-size: 1.4rem; margin-bottom: 10px; }
        p { color: #666; font-size: 0.95rem; margin-bottom: 25px; }
        .btn { 
            display: block; background: #25D366; color: white; 
            padding: 14px; border-radius: 10px; text-decoration: none; 
            font-weight: 600; font-size: 1.1rem; transition: background 0.3s;
        }
        .btn:hover { background: #128C7E; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Motosiklet Bilgi Paneli</h1>
        <p>Aracım veya park durumum ile ilgili önemli bir durum varsa lütfen iletişime geçin.</p>
        <a href="https://wa.me/905XXXXXXXXXX" class="btn">WhatsApp ile Mesaj Gönder</a>
    </div>
</body>
</html>
